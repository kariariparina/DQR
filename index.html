<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Denpa QR Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="container">

<h1>電波人間 QR Generator</h1>

<div class="card">

<label for="playerid">変換code</label>
<input
type="text"
id="playerid"
placeholder="例：cc0db7">

<label for="rsid">目標RSID</label>
<input
type="text"
id="rsid"
placeholder="例：aoFMuZ">

<button id="generate" disabled>
データ読込中...
</button>

</div>

<div class="status">

<p id="loading">
データセットを読み込んでいます...
</p>

</div>

<div id="result"></div>

<div id="qrcode"></div>

</div>

<script src="script.js"></script>

</body>

</html>
